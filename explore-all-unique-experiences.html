/* =====================================================
   FILTER LOGIC + RENDER
===================================================== */
const destSel=document.getElementById("destinationFilter");
const catSel=document.getElementById("categoryFilter");
const durSel=document.getElementById("durationFilter");
const bestChk=document.getElementById("bestFilter");
const res=document.getElementById("results");

[...new Set(experiences.map(e=>e.d))].forEach(v=>destSel.innerHTML+=`<option value="${v}">${v}</option>`);
[...new Set(experiences.flatMap(e=>e.c))].forEach(v=>catSel.innerHTML+=`<option value="${v}">${v}</option>`);
[...new Set(experiences.map(e=>e.du))].forEach(v=>durSel.innerHTML+=`<option value="${v}">${v}</option>`);

function render(){
  res.innerHTML="";
  const d=destSel.value,c=catSel.value,du=durSel.value,b=bestChk.checked;

  experiences.forEach(e=>{
    if(d!=="all"&&e.d!==d) return;
    if(c!=="all"&&!e.c.includes(c)) return;
    if(du!=="all"&&e.du!==du) return;
    if(b&&!e.b) return;

    const card=document.createElement("div");
    card.className="card";
    card.style.display="block";
    card.innerHTML=`
      <div class="destination">${e.d}</div>
      <h2>${e.t}</h2>
      <div class="badges">
        ${e.b?'<span class="badge best">BEST SELLER</span>':''}
        <span class="badge">${e.du}</span>
      </div>
      <div class="category">Category: ${e.c.join(", ")}</div>
      <a class="btn" href="${e.u}" target="_blank">View Experience</a>
    `;
    res.appendChild(card);
  });
}

[destSel,catSel,durSel,bestChk].forEach(el=>el.addEventListener("change",render));
</script>
