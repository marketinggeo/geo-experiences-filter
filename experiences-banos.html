<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experiences – Baños & Surroundings</title>

<!-- Montserrat Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #ffffff;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  color: #002060;
  font-weight: 600;
}

hr {
  border: none;
  border-top: 3px solid #1a73e8;
  margin: 10px 0 25px;
}

.filters {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 30px;
}

.filters label {
  font-weight: 500;
  margin-right: 10px;
}

.filters select,
.filters input {
  padding: 8px;
  margin-right: 20px;
  font-family: 'Montserrat';
}

.card {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 25px;
}

.card h2 {
  color: #002060;
  font-weight: 600;
  margin-top: 0;
}

.badge {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  margin-right: 8px;
}

.duration {
  background: #002060;
  color: #fff;
}

.category {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}

.button {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  background: #002060;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 500;
}
</style>
</head>

<body>

<div class="container">

<h1>Experiences – Baños & Surroundings</h1>
<hr>

<!-- Filters -->
<div class="filters">
  <label>Filter by Category:</label>
  <select>
    <option>All Categories</option>
    <option>Cultural / Arts & Crafts</option>
  </select>

  <label>Filter by Duration:</label>
  <select>
    <option>All Durations</option>
    <option>30 min</option>
  </select>

  <label>
    <input type="checkbox"> Show Best Sellers Only
  </label>
</div>

<!-- Experience Card -->
<div class="card">

  <h2>"Vegetable Ivory", Tagua Workshop</h2>

  <span class="badge duration">30 min</span>

  <div class="category">
    Category: Cultural / Arts & Crafts
  </div>

  <a class="button" href="https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/ba%C3%B1os-surroundings/vegetable-ivory-tagua-workshop?authuser=0" target="_blank">
    View Experience
  </a>

</div>

</div>

</body>
</html>
