<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experiences – Mindo & Surroundings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT – SAME AS QUITO -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: #ffffff;
    color: #002060;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
}

h1 {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 25px;
}

.filters {
    border: 1px solid #d9d9d9;
    border-radius: 8px;
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: center;
    margin-bottom: 30px;
}

.filters label {
    font-weight: 600;
    margin-right: 8px;
}

.filters select {
    padding: 8px 12px;
    font-family: 'Montserrat', sans-serif;
}

.filters input[type="checkbox"] {
    transform: scale(1.1);
    margin-right: 6px;
}

.experience-card {
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 25px;
}

.experience-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
}

.badges {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
}

.badge {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    display: inline-block;
}

.badge.duration {
    background: #002060;
    color: #ffffff;
}

.badge.best {
    background: #f5c400;
    color: #000000;
}

.category {
    font-size: 15px;
    color: #555555;
    margin-bottom: 16px;
}

.view-btn {
    display: inline-block;
    background: #002060;
    color: #ffffff;
    text-decoration: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
}

.view-btn:hover {
    background: #001744;
}
</style>
</head>

<body>

<div class="container">

<h1>Experiences – Mindo & Surroundings</h1>

<div class="filters">
    <div>
        <label>Filter by Category:</label>
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="Nature">Nature</option>
            <option value="Culinary">Culinary</option>
            <option value="Coffee">Coffee</option>
        </select>
    </div>

    <div>
        <label>Filter by Duration:</label>
        <select id="durationFilter">
            <option value="all">All Durations</option>
            <option value="1 hour">1 hour</option>
            <option value="2 hours">2 hours</option>
        </select>
    </div>

    <div>
        <input type="checkbox" id="bestSellerFilter">
        <label>Show Best Sellers Only</label>
    </div>
</div>

<!-- EXPERIENCE 1 -->
<div class="experience-card"
     data-category="Nature"
     data-duration="1 hour"
     data-best="no">

    <div class="experience-title">Close-up Hummingbird watching</div>

    <div class="badges">
        <span class="badge duration">1 hour</span>
    </div>

    <div class="category">Category: Nature</div>

    <a class="view-btn" href="https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/mindo-surroundings/close-up-hummingbird-watching?authuser=0" target="_blank">
        View Experience
    </a>
</div>

<!-- EXPERIENCE 2 -->
<div class="experience-card"
     data-category="Culinary"
     data-duration="2 hours"
     data-best="no">

    <div class="experience-title">Cacao & Chocolate Experience (w/ Lunch)</div>

    <div class="badges">
        <span class="badge duration">2 hours</span>
    </div>

    <div class="category">Category: Culinary</div>

    <a class="view-btn" href="https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/mindo-surroundings/mindo-chocolate-makers-cacao-chocolate-experience-w-lunch?authuser=0" target="_blank">
        View Experience
    </a>
</div>

<!-- EXPERIENCE 3 -->
<div class="experience-card"
     data-category="Coffee"
     data-duration="2 hours"
     data-best="no">

    <div class="experience-title">Specialty Ecuadorian Coffee Experience</div>

    <div class="badges">
        <span class="badge duration">2 hours</span>
    </div>

    <div class="category">Category: Coffee</div>

    <a class="view-btn" href="https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/mindo-surroundings/specialty-ecuadorian-coffee-experience?authuser=0" target="_blank">
        View Experience
    </a>
</div>

</div>

<script>
const categoryFilter = document.getElementById('categoryFilter');
const durationFilter = document.getElementById('durationFilter');
const bestSellerFilter = document.getElementById('bestSellerFilter');
const cards = document.querySelectorAll('.experience-card');

function applyFilters() {
    const category = categoryFilter.value;
    const duration = durationFilter.value;
    const bestOnly = bestSellerFilter.checked;

    cards.forEach(card => {
        const cardCategory = card.dataset.category;
        const cardDuration = card.dataset.duration;
        const cardBest = card.dataset.best;

        let visible = true;

        if (category !== 'all' && cardCategory !== category) visible = false;
        if (duration !== 'all' && cardDuration !== duration) visible = false;
        if (bestOnly && cardBest !== 'yes') visible = false;

        card.style.display = visible ? 'block' : 'none';
    });
}

categoryFilter.addEventListener('change', applyFilters);
durationFilter.addEventListener('change', applyFilters);
bestSellerFilter.addEventListener('change', applyFilters);
</script>

</body>
</html>
