<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Boutique | Rates 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Montserrat', sans-serif;
  margin:0;
  background:#f5f5f5;
}

.container{
  max-width:1300px;
  margin:60px auto;
  padding:0 20px;
}

.card-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.rate-card{
  background:#fff;
  border:1px solid #d9d9d9;
  padding:40px;
  cursor:pointer;
  transition:all 0.25s ease;
}

.rate-card:hover{
  border-color:#002060;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.rate-card h2{
  margin:0 0 10px 0;
  font-size:20px;
  font-weight:600;
  color:#002060;
}

.rate-section{
  display:none;
  margin-top:60px;
}

.back-btn{
  margin-bottom:30px;
  font-size:13px;
  color:#002060;
  cursor:pointer;
}

.filter-bar{
  margin-bottom:30px;
}

.filter-bar select{
  padding:10px 14px;
  font-size:13px;
  border:1px solid #d9d9d9;
}

.program{
  margin-bottom:80px;
}

.hidden{
  display:none !important;
}

</style>
</head>

<body>

<div class="container">

<!-- MAIN MENU -->
<div id="mainMenu" class="card-grid">

<div class="rate-card" onclick="showSection('galapagos')">
<h2>Galápagos Rates 2026</h2>
<p>Shared tours and island programs.</p>
</div>

<div class="rate-card" onclick="showSection('mainland')">
<h2>Mainland Rates 2026</h2>
<p>Shared mainland programs.</p>
</div>

</div>

<!-- GALAPAGOS SECTION -->
<div id="galapagos" class="rate-section">

<div class="back-btn" onclick="goBack()">← Back</div>

<div class="filter-bar">
<select onchange="filterPrograms(this, 'galapagos')">
<option value="all">All Programs</option>
<option value="loop6">Galápagos Loop 6D/5N</option>
<option value="loop7">Galápagos Loop 7D/6N</option>
<option value="darwin">Charles Darwin Path</option>
</select>
</div>

<div class="programs-wrapper">
<!-- PROGRAMS GO HERE -->
</div>

</div>

<!-- MAINLAND SECTION -->
<div id="mainland" class="rate-section">

<div class="back-btn" onclick="goBack()">← Back</div>

<div class="filter-bar">
<select onchange="filterPrograms(this, 'mainland')">
<option value="all">All Programs</option>
<option value="volcano3d">Volcano Avenue 3D/2N</option>
<option value="volcano5d">Volcano Avenue 5D/4N</option>
<option value="volcano6d">Volcano Avenue 6D/5N</option>
</select>
</div>

<div class="programs-wrapper">
<!-- PROGRAMS GO HERE -->
</div>

</div>

</div>
<script>

function showSection(sectionId){

  // Ocultar menú principal
  document.getElementById('mainMenu').style.display = 'none';

  // Ocultar todas las secciones
  const sections = document.querySelectorAll('.rate-section');
  sections.forEach(section => {
    section.style.display = 'none';
  });

  // Mostrar la sección solicitada
  const activeSection = document.getElementById(sectionId);
  activeSection.style.display = 'block';

  // Resetear filtro al entrar
  const select = activeSection.querySelector('select');
  if(select){
    select.value = 'all';
    filterPrograms(select, sectionId);
  }

}

function goBack(){

  // Mostrar menú principal
  document.getElementById('mainMenu').style.display = 'grid';

  // Ocultar todas las secciones
  const sections = document.querySelectorAll('.rate-section');
  sections.forEach(section => {
    section.style.display = 'none';
  });

}

</script>
