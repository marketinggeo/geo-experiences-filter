<style>
    body {
        font-family: 'Montserrat', sans-serif;
        margin: 20px;
        color: #002060;
    }

    .filter-box {
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    label {
        font-weight: 600;
        font-size: 14px;
    }

    select, input[type="checkbox"] {
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-family: Montserrat;
    }

    .experience-card {
        border: 1px solid #e4e4e4;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 15px;
        background: #fff;
    }

    .experience-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #002060;
    }

    .experience-meta {
        font-size: 14px;
        margin-bottom: 10px;
        color: #555;
    }

    .badge {
        display: inline-block;
        background: #ffd500;
        color: #000;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 700;
        margin-right: 6px;
    }

    .duration-tag {
        display: inline-block;
        background: #002060;
        color: white;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
    }

    a.button {
        display: inline-block;
        padding: 10px 16px;
        background: #002060;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
    }
</style>
</head>

    </select>

    <label style="display:flex; align-items:center; gap:5px;">

// Populate dropdowns
const categoryFilter = document.getElementById("categoryFilter");
const durationFilter = document.getElementById("durationFilter");
const bestSellerFilter = document.getElementById("bestSellerFilter");

function loadFilters() {
    const categories = new Set();
    const durations = new Set();

    experiences.forEach(exp => {
        exp.categories.forEach(cat => categories.add(cat));
        durations.add(exp.duration);
    });

    categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        categoryFilter.appendChild(opt);
    });

    durations.forEach(dur => {
        const opt = document.createElement("option");
        opt.value = dur;
        opt.textContent = dur;
        durationFilter.appendChild(opt);
    });
}


// Render experiences
function renderExperiences() {
    const container = document.getElementById("results");
    container.innerHTML = "";

    const cat = categoryFilter.value;
    const dur = durationFilter.value;
    const showBest = bestSellerFilter.checked;

    const filtered = experiences.filter(exp => {
        const matchCategory = cat === "all" || exp.categories.includes(cat);
        const matchDuration = dur === "all" || exp.duration === dur;
        const matchBest = !showBest || exp.bestSeller;
        return matchCategory && matchDuration && matchBest;
    });

    filtered.forEach(exp => {
        const card = document.createElement("div");
        card.className = "experience-card";

        card.innerHTML = `
            <div class="experience-title">${exp.title}</div>
            <div class="experience-meta">
                ${exp.bestSeller ? `<span class="badge">BEST SELLER</span>` : ""}
                <span class="duration-tag">${exp.duration}</span>
                <br><br>
                Category: ${exp.categories.join(", ")}
            </div>
            <a class="button" href="${exp.url}" target="_blank">View Experience</a>
        `;

        container.appendChild(card);
    });
}

categoryFilter.onchange = renderExperiences;
durationFilter.onchange = renderExperiences;
bestSellerFilter.onchange = renderExperiences;

loadFilters();
renderExperiences();
</script>
