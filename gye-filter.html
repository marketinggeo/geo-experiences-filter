<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experiences – Guayaquil & Surroundings</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Montserrat', sans-serif;
        background: #f7f7f7;
        margin: 0;
        padding: 20px;
        color: #002060;
    }

    h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 25px;
    }

    /* FILTER BAR */
    .filter-container {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 25px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }

    label {
        font-weight: 600;
        margin-right: 6px;
    }

    select {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        font-family: Montserrat;
    }

    input[type="checkbox"] {
        transform: scale(1.2);
        margin-right: 8px;
    }

    /* EXPERIENCE CARDS */
    .experience-card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 25px;
    }

    .experience-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #002060;
    }

    .badge-container {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }

    .badge-yellow {
        background: #FFD500;
        color: #000;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
    }

    .badge-blue {
        background: #002060;
        color: #fff;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
    }

    .category-text {
        color: #555;
        font-size: 14px;
        margin-top: 10px;
        margin-bottom: 18px;
        font-weight: 500;
    }

    /* BUTTON */
    .experience-btn {
        background: #002060;
        color: #fff;
        padding: 10px 20px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        display: inline-block;
    }

    .experience-btn:hover {
        background: #003499;
    }
</style>
</head>
<body>

<h1>Experiences – Guayaquil & Surroundings</h1>

<!-- FILTER BAR -->
<div class="filter-container">
    <div>
        <label>Filter by Category:</label>
        <select id="categoryFilter">
            <option value="All">All Categories</option>
        </select>
    </div>

    <div>
        <label>Filter by Duration:</label>
        <select id="durationFilter">
            <option value="All">All Durations</option>
        </select>
    </div>

    <div>
        <input type="checkbox" id="bestSellerFilter">
        <label for="bestSellerFilter">Show Best Sellers Only</label>
    </div>
</div>

<!-- EXPERIENCE LIST -->
<div id="experiencesContainer"></div>

<script>
const experiences = [
    {
        title: "Cacao Plantation (w/ Lunch)",
        category: ["Chocolate"],
        duration: "2 hours",
        bestSeller: true,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/cacao-plantation-w-lunch?authuser=0"
    },
    {
        title: "Clay Pottery Workshop (w/ Souvenir)",
        category: ["Cultural", "Art & Crafts"],
        duration: "2 hours",
        bestSeller: false,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/clay-pottery-workshop-w-souvenir?authuser=0"
    },
    {
        title: "Ecuadorian Wine & Chocolate Tasting and Pairing Experience",
        category: ["Culinary", "Wine"],
        duration: "1 hour",
        bestSeller: false,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/ecuadorian-wine-chocolate-tasting-and-pairing-experience?authuser=0"
    },
    {
        title: "Ecuadorian Wine Tasting & Pairing Experience w/lunch",
        category: ["Culinary", "Wine"],
        duration: "1 hour",
        bestSeller: false,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/ecuadorian-wine-tasting-pairing-experience-wlunch?authuser=0"
    },
    {
        title: "Tour of Wine Vineyard and Live Cooking Experience",
        category: ["Culinary", "Wine"],
        duration: "8 hours",
        bestSeller: false,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/tour-of-wine-vineyard-and-live-cooking-experience?authuser=0"
    },
    {
        title: "Tour of Wine Vineyard and Premium Pairing Experience",
        category: ["Culinary", "Wine"],
        duration: "8 hours",
        bestSeller: false,
        url: "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo/guayaquil-surroundings/tour-of-wine-vineyard-and-premium-pairing-experience?authuser=0"
    }
];

const container = document.getElementById('experiencesContainer');

function renderExperiences() {
    container.innerHTML = "";

    const selectedCategory = document.getElementById('categoryFilter').value;
    const selectedDuration = document.getElementById('durationFilter').value;
    const onlyBest = document.getElementById('bestSellerFilter').checked;

    const filtered = experiences.filter(exp => {
        const matchesCategory = selectedCategory === "All" || exp.category.includes(selectedCategory);
        const matchesDuration = selectedDuration === "All" || exp.duration === selectedDuration;
        const matchesBest = !onlyBest || exp.bestSeller;
        return matchesCategory && matchesDuration && matchesBest;
    });

    filtered.forEach(exp => {
        const card = document.createElement('div');
        card.className = "experience-card";

        card.innerHTML =
            '<div class="experience-title">' + exp.title + '</div>' +
            '<div class="badge-container">' +
            (exp.bestSeller ? '<div class="badge-yellow">BEST SELLER</div>' : '') +
            '<div class="badge-blue">' + exp.duration + '</div>' +
            '</div>' +
            '<div class="category-text"><strong>Category:</strong> ' + exp.category.join(", ") + '</div>' +
            '<a class="experience-btn" href="' + exp.url + '" target="_blank">View Experience</a>';

        container.appendChild(card);
    });
}

// Populate dropdowns
(function populateFilters() {
    const categorySet = new Set();
    const durationSet = new Set();

    experiences.forEach(exp => {
        exp.category.forEach(cat => categorySet.add(cat));
        durationSet.add(exp.duration);
    });

    categorySet.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        document.getElementById('categoryFilter').appendChild(option);
    });

    durationSet.forEach(dur => {
        const option = document.createElement("option");
        option.value = dur;
        option.textContent = dur;
        document.getElementById('durationFilter').appendChild(option);
    });
})();

document.getElementById('categoryFilter').addEventListener('change', renderExperiences);
document.getElementById('durationFilter').addEventListener('change', renderExperiences);
document.getElementById('bestSellerFilter').addEventListener('change', renderExperiences);

renderExperiences();
</script>

</body>
</html>
