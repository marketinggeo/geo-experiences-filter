<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guayaquil Experiences Filter</title>

<!-- Montserrat Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Montserrat', sans-serif;
        margin: 20px;
        color: #002060;
    }

    /* Filter Bar */
    .filter-container {
        display: flex;
        gap: 25px;
        align-items: center;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        margin-bottom: 25px;
        background: #fafafa;
    }

    .filter-container label {
        font-weight: 600;
        margin-right: 6px;
    }

    select, input[type="checkbox"] {
        font-size: 14px;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: 'Montserrat';
    }

    /* Experience Card */
    .experience-card {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 18px;
        margin-bottom: 18px;
        background: white;
    }

    .title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #002060;
        text-decoration: none;
    }

    .meta {
        font-size: 14px;
        color: #444;
        margin-bottom: 10px;
    }

    .best-seller {
        display: inline-block;
        background: #ffcc00;
        padding: 4px 10px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 12px;
        margin-left: 10px;
    }
</style>
</head>

<body>

<!-- FILTER BAR -->
<div class="filter-container">
    <div>
        <label>Filter by Category:</label>
        <select id="categoryFilter"></select>
    </div>

    <div>
        <label>Filter by Duration:</label>
        <select id="durationFilter"></select>
    </div>

    <div style="display:flex; align-items:center;">
        <input type="checkbox" id="bestSellerFilter">
        <label for="bestSellerFilter" style="margin-left:6px;">Show Best Sellers Only</label>
    </div>
</div>

<!-- EXPERIENCE LIST -->
<div id="experienceList"></div>

<script>
const experiencesData = {
"experiences": [
    {
        "title": "Cacao Plantation (w/ Lunch)",
        "category": ["Chocolate"],
        "duration": "2 hours",
        "bestSeller": true,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/cacao-plantation-w-lunch?authuser=0"
    },
    {
        "title": "Clay Pottery Workshop (w/ Souvenir)",
        "category": ["Cultural", "Art & Crafts"],
        "duration": "2 hours",
        "bestSeller": false,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/clay-pottery-workshop-w-souvenir?authuser=0"
    },
    {
        "title": "Ecuadorian Wine & Chocolate Tasting and Pairing Experience",
        "category": ["Culinary", "Wine"],
        "duration": "1 hour",
        "bestSeller": false,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/ecuadorian-wine-chocolate-tasting-and-pairing-experience?authuser=0"
    },
    {
        "title": "Ecuadorian Wine Tasting & Pairing Experience w/lunch",
        "category": ["Culinary", "Wine"],
        "duration": "1 hour",
        "bestSeller": false,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/ecuadorian-wine-tasting-pairing-experience-wlunch?authuser=0"
    },
    {
        "title": "Tour of Wine Vineyard and Live Cooking Experience",
        "category": ["Culinary", "Wine"],
        "duration": "8 hours",
        "bestSeller": false,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/tour-of-wine-vineyard-and-live-cooking-experience?authuser=0"
    },
    {
        "title": "Tour of Wine Vineyard and Premium Pairing Experience",
        "category": ["Culinary", "Wine"],
        "duration": "8 hours",
        "bestSeller": false,
        "url": "https://sites.google.com/georeisen-ecuador.com/unique-experiences-geo-2025/guayaquil-surroundings/tour-of-wine-vineyard-and-premium-pairing-experience?authuser=0"
    }
]};

// Populate Filters
function populateFilters() {
    const categoryFilter = document.getElementById("categoryFilter");
    const durationFilter = document.getElementById("durationFilter");

    const categories = new Set();
    const durations = new Set();

    experiencesData.experiences.forEach(exp => {
        exp.category.forEach(cat => categories.add(cat));
        durations.add(exp.duration);
    });

    categoryFilter.innerHTML = `<option value="All">All Categories</option>`;
    durationFilter.innerHTML = `<option value="All">All Durations</option>`;

    categories.forEach(cat => {
        categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
    });

    durations.forEach(d => {
        durationFilter.innerHTML += `<option value="${d}">${d}</option>`;
    });
}

// Render Experiences
function renderExperiences() {
    const category = document.getElementById("categoryFilter").value;
    const duration = document.getElementById("durationFilter").value;
    const showBest = document.getElementById("bestSellerFilter").checked;

    const list = document.getElementById("experienceList");
    list.innerHTML = "";

    experiencesData.experiences.forEach(exp => {
        if ((category !== "All" && !exp.category.includes(category)) ||
            (duration !== "All" && exp.duration !== duration) ||
            (showBest && !exp.bestSeller)) return;

        const card = document.createElement("div");
        card.className = "experience-card";

        card.innerHTML = `
            <a href="${exp.url}" class="title">${exp.title}</a>
            ${exp.bestSeller ? `<span class="best-seller">Best Seller</span>` : ""}
            <div class="meta">Category: ${exp.category.join(", ")} · Duration: ${exp.duration}</div>
        `;

        list.appendChild(card);
    });
}

populateFilters();
renderExperiences();

document.getElementById("categoryFilter").addEventListener("change", renderExperiences);
document.getElementById("durationFilter").addEventListener("change", renderExperiences);
document.getElementById("bestSellerFilter").addEventListener("change", renderExperiences);
</script>

</body>
</html>
